<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hw_6-3</title>

    <link rel="stylesheet" href="hw_6-3.css" />
  </head>
  <body>
    <div class="container">
      <div class="auth-page">
        <div class="auth-card">
          <h1 class="auth-card__logo">Instagram</h1>
          <form class="auth-form">
            <div class="auth-form__fields">
              <input
                type="text"
                class="auth-form__input"
                placeholder="Номер телефону, ім'я користувача або емейл"
              />
              <input
                type="password"
                class="auth-form__input"
                placeholder="Пароль"
              />
              <button type="submit" class="auth-form__btn">Увійти</button>
            </div>
          </form>

          <div class="auth-divider">
            <span class="auth-divider__text">АБО</span>
          </div>

          <div class="auth-socials">
            <a class="auth-socials__link" href="">
              <img
                class="auth-socials__icon"
                src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Facebook_logo_%28square%29.png"
                alt="Facebook"
              />
              <p class="auth-socials__text">Увійти через Facebook</p>
            </a>
          </div>

          <a href="#" class="auth-card__forgot">Забули пароль?</a>
        </div>

        <div class="auth-card auth-card--bottom">
          <p class="auth-card__text">Не маєте облікового запису?</p>
          <a href="#" class="auth-card__link">Зареєструйтеся</a>
        </div>
      </div>
    </div>
  </body>
</html>
