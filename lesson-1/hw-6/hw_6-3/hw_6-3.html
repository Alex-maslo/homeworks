<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hw_6-3</title>

    <link rel="stylesheet" href="hw_6-3.css" />
  </head>
  <body>
    <div class="container">
      <div class="auth-page">
        <div class="auth-card">
          <form class="auth-form">
            <h1 class="auth-form__logo">Instagram</h1>

            <div class="auth-form__fields">
              <input
                type="text"
                class="auth-form__input"
                placeholder="Номер телефону, ім'я користувача або емейл"
              />
              <input
                type="password"
                class="auth-form__input"
                placeholder="Пароль"
              />
              <button type="submit" class="auth-form__btn">Увійти</button>
            </div>
          </form>
        </div>

        <div class="auth-card auth-card--bottom">
          <p class="auth-card__text">
            Не маєте облікового запису?
            <a href="#" class="auth-card__link">Зареєструйтеся</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
