<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hw_6-2</title>

    <link rel="stylesheet" href="hw_6-2.css" />
  </head>
  <body>
    <div class="container">
      <form class="login-form">
        <h2 class="login-form__title roboto-400">Вхід в особистий кабінет</h2>

        <div class="login-form__container">
          <div class="login-form__fields">
            <input
              type="text"
              placeholder="Логін або email"
              class="login-form__input"
              required
            />

            <input
              type="password"
              placeholder="Пароль"
              class="login-form__input"
              required
            />
          </div>

          <div class="login-form__footer">
            <label class="login-form__checkbox-label">
              Запам'ятати мене
              <input type="checkbox" class="login-form__checkbox" />
            </label>

            <button type="submit" class="login-form__btn">Вхід</button>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
