<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hw_9-2</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .container {
        display: grid;
        grid-template-rows: 244fr 629fr 244fr;
        height: 100vh;
      }

      .header,
      .footer {
        background-color: #d9d9d9;
      }

      .main {
        display: grid;
        grid-template-columns: 464fr 800fr 464fr;
      }

      .section:nth-child(1),
      .section:nth-child(3) {
        background-color: #c0bdbd;
      }

      .section:nth-child(2) {
        background-color: #a4a4a4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header"></header>
      <main class="main">
        <section class="section"></section>
        <section class="section"></section>
        <section class="section"></section>
      </main>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
